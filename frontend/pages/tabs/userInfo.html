

    <h1 id="info-header">Account Information</h1>

<div class="info-container">
    <div class="info-section user-info">
        <div class="user-details">
            <div class="detail-item">
                <label>Username:</label>
                <input type="text" id="user-username" readonly>
            </div>
            <div class="detail-item">
                <label>Email:</label>
                <input type="text" id="user-email" readonly>
            </div>
            <div class="detail-item">
                <label>Member Since:</label>
                <span id="user-joined">-</span>
            </div>
            <div class="detail-item">
                <label>Contact Number:</label>
                <input type="text" id="user-contact" placeholder="Enter contact number" readonly>
            </div>

            <div class="info-button">
                <button id="edit-info-btn">Edit Information</button>
                <button id="change-password-btn">Change Password</button>
            </div>
        </div>
    </div>

    
    
</div>
