<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.0/css/line.css">
    <link rel="stylesheet" href="../assests/css/style.css">
    <title>Taskify</title>
</head>
<body>
    <header>
        <div class="header">
            <div class="header-left">
                <h1>
                    <a href="" class="href">Taskify</a>
                </h1>
            </div>

            <div class="header-center">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search your task here...">
                    <i class="uil uil-search search-icon"></i>
                </div>
            </div>
            
            <div class="header-right">
                <div class="actions">
                <i class="uil uil-bell notification"></i>
                <i class="uil uil-calendar-alt schedule"></i>
            </div>
            <div class="date">
                <span id="current-day"></span>
                <span id="current-date"></span>
            </div>
            </div>
            
            
        </div>
    </header>

    <div class="sidebar">
        <h2 class="logo"><span>Dash</span>board</h2>

        <div class="profile">
            <img src="https://scontent.fsgn5-11.fna.fbcdn.net/v/t39.30808-6/588546170_1361983112261783_61586126430797922_n.jpg?_nc_cat=111&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=YkwRyU54XhgQ7kNvwFxJ6mA&_nc_oc=AdqCWXtYjprEB739yFYtC5YxB-jiPo_wNHGpyEH9mSrahDDAPt6lQPJIcfqB6T2UJNs&_nc_zt=23&_nc_ht=scontent.fsgn5-11.fna&_nc_gid=_taEnPOQ8DB8AMKHN-Qt1w&_nc_ss=7a3a8&oh=00_Af3I41mIjrlJLMtvCpTJIANk2achUrE_mCgH6Feay81oiA&oe=69DEE0BC" alt="avatar">
            <h3>Evin Tran</h3>
            <p>evin.tran@gmail.com</p>
        </div>

        <ul class="sidebar-menu">
            <li class="active">Dashboard</li>
            <li>Vital Task</li>
            <li>My Task</li>
            <li>Task Categories</li>
            <li>Settings</li>
            <li>Help</li>
        </ul>

        <div class="logout">
            <i class="uil uil-signout"></i>
            <span>Logout</span>
        </div>
    </div>
    

    <div class="wrapper">
        <h1>Plan Your Day</h1>
        <div class="task-input">
            <img src="../assests/images/icon/bars-icon.svg" >
            <input type="text" placeholder="Add a new task...">
        
        </div>
        <div class="controls">
            <div class="filters">
                <span id="all" class="active">All</span>
                <span id="pending">Pending</span>
                <span id="completed">Completed</span>
            </div>
            <button class="clear-btn">Clear All</button>
        </div>

        <ul class="task-box"></ul>
    <script type="module" src="../assests/js/main.js"></script>
</body>
</html>
