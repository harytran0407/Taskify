<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../features/dashboard/dashboard.css">
    <link rel="stylesheet" href="../features/user/userInfo.css">
    <title>Taskify</title>
</head>
<body>
    <header>
        <div class="header">
            <div class="header-left">
                <h1>
                    <a href="" class="href">Taskify</a>
                </h1>
            </div>

            <div class="header-center">
                <div class="search-container">
                    <input type="search" id="search" autocomplete="off" placeholder="Search your task here...">
                    <i class="uil uil-search search-icon"></i>
                </div>
            </div>
            
            <div class="header-right">
                <div class="actions">
                <i class="uil uil-bell notification"></i>
                <i class="uil uil-calendar-alt schedule"></i>
            </div>
            <div class="date">
                <span id="current-day"></span>
                <span id="current-date"></span>
            </div>
            </div>
            
            
        </div>
    </header>

    <div class="page-container">
        <div class="sidebar">
            <div id="auth-section">
                <div class="profile" id="profile-section" style="display: none;">
                    <img src="https://scontent.fsgn5-11.fna.fbcdn.net/v/t39.30808-6/588546170_1361983112261783_61586126430797922_n.jpg?_nc_cat=111&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=YkwRyU54XhgQ7kNvwFxJ6mA&_nc_oc=AdqCWXtYjprEB739yFYtC5YxB-jiPo_wNHGpyEH9mSrahDDAPt6lQPJIcfqB6T2UJNs&_nc_zt=23&_nc_ht=scontent.fsgn5-11.fna&_nc_gid=_taEnPOQ8DB8AMKHN-Qt1w&_nc_ss=7a3a8&oh=00_Af3I41mIjrlJLMtvCpTJIANk2achUrE_mCgH6Feay81oiA&oe=69DEE0BC" alt="avatar">
                    <h3 id="username"></h3>
                    <p id="email"></p>
                </div>

                <div class="auth-buttons" id="auth-buttons">
                    <a href="login.html" class="btn-signin">Sign In</a>
                    <a href="register.html" class="btn-signup">Sign Up</a>
                </div>
            </div>

            <ul class="sidebar-menu">
                <li class="active" data-tab="dashboard">
                    <i class="uil uil-estate"></i> 
                    Dashboard
                </li>
                <li data-tab="vital">
                    <i class="uil uil-bolt"></i>
                    Vital Task
                </li>
                <li data-tab="my-task">
                    <i class="uil uil-clipboard-notes"></i> 
                    My Task
                </li>
                <li data-tab="categories">
                    <i class="uil uil-apps"></i> 
                    Task Categories
                </li>
                <li data-tab="settings">
                    <i class="uil uil-setting"></i> 
                    Settings
                </li>
                <li data-tab="information">
                    <i class="uil uil-user"></i> 
                    User Information
                </li>
            </ul>

            <div class="logout" id="logout-btn" style="display: none;">
                <i class="uil uil-signout"></i>
                <span>Logout</span>
            </div>
        </div>

        <div class="wrapper">
            <div id="app">
                <h2>Loading...</h2>
            </div>
        </div>
    </div>
    <script type="module" src="../main.js"></script>
</body>
</html>
